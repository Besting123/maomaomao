<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>北京交通大学校园地图</title>
<link rel="stylesheet" href="libs/leaflet.min.css"/>
<script src="libs/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; }
  html, body, #map { width: 100%; height: 100%; background: #f0ede7; }
  .cat-popup { font-family: sans-serif; }
  .cat-popup h3 { font-size: 14px; margin-bottom: 4px; color: #8B5928; }
  .cat-popup .tag { display: inline-block; background: #C9EBCA; color: #3A593F; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; margin-bottom: 6px; }
  .cat-popup p { font-size: 12px; color: #555; line-height: 1.4; }
  .building-icon { background: rgba(139,89,40,0.85); color: #fff; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
  .cat-marker { width: 36px; height: 36px; border-radius: 50%; border: 3px solid #8B5928; box-shadow: 0 0 0 4px rgba(139,89,40,0.2), 0 2px 8px rgba(0,0,0,0.3); background: #FFA726; display: flex; align-items: center; justify-content: center; font-size: 18px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px rgba(139,89,40,0.2); } 50% { box-shadow: 0 0 0 10px rgba(139,89,40,0.08); } }
</style>
</head>
<body>
<div id="map"></div>
<script>
var center = [39.9537, 116.3490];
var map = L.map('map', { center: center, zoom: 17, minZoom: 15, maxZoom: 19, zoomControl: false, attributionControl: false });

// 尝试多个瓦片源，确保至少一个能加载
var tileLoaded = false;

// 瓦片源1: 高德地图
var amap = L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', { maxZoom: 19 });

// 瓦片源2: OpenStreetMap
var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });

// 瓦片源3: 腾讯地图
var tencent = L.tileLayer('https://rt0.map.gtimg.com/tile?z={z}&x={x}&y={y}&type=vector&styleid=0', { maxZoom: 19 });

// 先加高德，如果失败换OSM
amap.addTo(map);
amap.on('tileerror', function() {
  if (!tileLoaded) { tileLoaded = true; map.removeLayer(amap); osm.addTo(map); }
});

// 建筑
[
  ['📚 图书馆', 39.9555, 116.3480],
  ['🏛 思源楼', 39.9530, 116.3510],
  ['🏫 逸夫楼', 39.9540, 116.3460],
  ['🍽 学生食堂', 39.9520, 116.3470],
  ['🏟 体育馆', 39.9510, 116.3500],
  ['🌳 明湖', 39.9545, 116.3505]
].forEach(function(b) {
  L.marker([b[1], b[2]], {
    icon: L.divIcon({ className: '', html: '<div class="building-icon">' + b[0] + '</div>', iconSize: [0, 0], iconAnchor: [40, 12] })
  }).addTo(map);
});

// 猫咪
[
  ['大白', '适合远观', '图书馆东侧草坪', '此区域通常有3只猫咪出没', 39.9552, 116.3492, '🐱'],
  ['橘子', '补水正常', '思源楼北侧补水点', '补水点刚维护，适合记录', 39.9535, 116.3505, '🐈'],
  ['奶油', '请勿打扰', '林荫道休息区', '正在休息，建议远距离观察', 39.9525, 116.3478, '😺'],
  ['小墨', '可远观', '食堂后方灌木丛', '正在觅食，保持安静', 39.9518, 116.3480, '🐈‍⬛']
].forEach(function(c) {
  var m = L.marker([c[4], c[5]], {
    icon: L.divIcon({ className: '', html: '<div class="cat-marker">' + c[6] + '</div>', iconSize: [36, 36], iconAnchor: [18, 18] })
  }).addTo(map);
  m.bindPopup('<div class="cat-popup"><h3>' + c[6] + ' ' + c[0] + '</h3><span class="tag">' + c[1] + '</span><p><b>' + c[2] + '</b></p><p>' + c[3] + '</p></div>', { maxWidth: 220, closeButton: false });
});

// 关怀路径
L.polyline([[39.9555,116.3480],[39.9552,116.3492],[39.9535,116.3505],[39.9525,116.3478],[39.9518,116.3480]], { color: '#8B5928', weight: 3, opacity: 0.6, dashArray: '8, 8' }).addTo(map);
</script>
</body>
</html>
